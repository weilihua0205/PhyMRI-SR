meta_train_tasks:
  - name: sim_task_1
    patient_id_regex: '^(IXI\d+-HH-\d+)_T2_brain_resampled_slice_\d+\.npy$'
    patient_id_group: 1
    dataset:
      name: paired-npy-folders-with-mask
      args:
        root_path_lr: /home/meta_task_all/task1/LR
        root_path_hr: /home/meta_task_all/task1/HR
        root_path_mask: /home/meta_task_all/task1/mask
        cache: in_memory
        repeat: 1
    wrapper:
      name: sr-implicit-paired
      args:
        inp_size: 64
        augment: false
