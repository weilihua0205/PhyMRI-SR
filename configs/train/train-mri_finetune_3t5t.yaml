


train_dataset:
  dataset:
    name: paired-npy-folders-with-mask
    args:
     
      root_path_1: /home/dataset/3t5t/train/LR
    
      root_path_2: /home/dataset/3t5t/train/HR
      root_path_mask: /home/dataset/3t5t/train/mask
      cache: in_memory
      repeat: 1
  wrapper:
    name: sr-implicit-paired
    args:
      inp_size: 64 
      augment: true  

val_dataset:
  dataset:
    name: paired-npy-folders-with-mask
    args:
      root_path_1: /home/dataset/3t5t/val/LR
      root_path_2: /home/dataset/3t5t/val/HR
      root_path_mask: /home/dataset/3t5t/val/mask
      cache: in_memory
      repeat: 1
  wrapper:
    name: sr-implicit-paired
    args:
      inp_size: 64
      augment: false
  batch_size: 1

batch_size: 2  
num_workers: 4

model:
  name: continuous-gaussian
  args:
    encoder_spec:
      name: swinir
      args:
        no_upsampling: true
    cnn_spec: {}
    fc_spec: {}
    BLOCK_H: 16
    BLOCK_W: 16

optimizer:
  name: adam
  args:
    lr: 1.0e-5  
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0


lr_scheduler:
  name: MultiStepLR
  args:
    milestones: [30, 60, 90]  
    gamma: 0.5 


loss:
  name: CombinedLoss
  args:
    losses_dict:
      L1Loss: 0.6
      FrequencyLoss: 0.2
      GradientLoss: 0.2


selection_metric: composite
selection_weights:
  psnr: 0.0
  ssim: 1.0
  dists: 0.5


num_epochs: 100  
start_epoch: 0  
log_interval: 1  
val_interval: 1  
save_interval: 5  



data_norm:
  inp: {sub: [0], div: [1]}
  gt: {sub: [0], div: [1]}


eval_type: div2k

seed: 42
grad_clip: 1.0  
